<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/login_ex.css">
</head>
<body>
     <!-- 연습2 -->
     <div class="login-box2">
             <!-- 네이버 로고 -->
      <p class="naver-logo"><img src="image/naver_logo.png" alt="네이버 로고"></p>
     <!-- 위 박스 -->
      <div class="login-btnbox">
        <!-- 상단 선택 버튼 -->
        <div class="top-btn">
            <ul>
                <li>ID/전화번호</li>
                <li>일회용 번호</li>
                <li>QR코드</li>
            </ul>
            </div>
            <!-- 입력폼 -->
             <form action="#" class="form-wrap2">
                <input type="text" placeholder="아이디 또는 전화번호" class="id-box">
                <input type="password" placeholder="비밀번호" class="pw">
             </form>
             <div class="form-wrap2-2">
                <form action="#" class="radio-btn">
              <input type="radio">
             </form>
             <p class="login-check">로그인 상태 유지</p>
             </div>
             <!-- 로그인 버튼 -->
              <button class="login-btnclick">로그인</button>
      </div>
      <!-- 하단 선택 -->
        <div class="bottom-btn">
                <ul>
                    <li>비밀번호 찾기</li>
                    <li>|</li>
                    <li>아이디 찾기</li>
                    <li>|</li>
                    <li>회원가입</li>
                </ul>
              </div>
              <!-- 하단 광고 -->
              <p class="bottom-ad"><img src="image/ad.png" alt="아래 광고"></p>
              <!-- 이용 약관 -->
               <!-- <div class="bottom-txt">
                <p>이용약관 | <b>개인정보처리방침</b> | 책임의 한계와 법적고지 | 회원정보 고객센터 </p>
                <p class="bottom-logo"><img src="image/naver_logo.png" alt="네이버 로고"></p>
                 -->
               </div>
     </div>

</body>
</html>
